<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Matching the black exactly to your image edges */
            background-color: #010105 !important; 
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* This ensures the goddess is fully visible without being cut off */
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain; 
            z-index: -10;
        }

        .scroll-container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-style: italic;
            font-weight: normal;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
            margin-bottom: 10px;
        }

        .intro {
            max-width: 650px;
            text-align: center;
            line-height: 1.6;
            text-shadow: 2px 2px 10px black;
            margin-bottom: 40px;
        }

        /* This area is now INVISIBLE so the goddess shows through */
        .map {
            position: relative;
            width: 100%;
            max-width: 600px; 
            height: 600px;
            background: transparent !important;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
        }

        .star {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px #aaddff;
        }

        .name {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px black;
        }

        /* Star positions adjusted for 'Contain' scale */
        #n1 { top: 15%; left: 32%; } /* Crown */
        #n2 { top: 32%; left: 38%; } /* Heart */
        #n3 { top: 25%; left: 18%; } /* Hand */
        #n4 { top: 85%; left: 45%; } /* Feet */

        #panel {
            max-width: 550px;
            margin-top: 40px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: none;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <p class="intro">Click the glowing stars to navigate the dwelling places of rhetoric.</p>

        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos')"><div class="star"></div><span class="name">Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos')"><div class="star"></div><span class="name">Ethos</span></div>
            <div class="node" id="n3" onclick="openNode('invite')"><div class="star"></div><span class="name">Invitation</span></div>
            <div class="node" id="n4" onclick="openNode('kairos')"><div class="star"></div><span class="name">Kairos</span></div>
        </div>

        <div id="panel"></div>
    </div>

    <script>
        const info = {
            logos: "<h3>Isocratean Logoi</h3><p>The energy of assembly that calls community into being.</p>",
            ethos: "<h3>Ethos as Dwelling</h3><p>An open site where relation is the priority.</p>",
            invite: "<h3>Invitational Rhetoric</h3><p>Offering perspective rather than demanding compliance.</p>",
            kairos: "<h3>Kairos & Movement</h3><p>The 'right time' shifting from persuasion to a moment of welcome.</p>"
        };

        function openNode(k) {
            const p = document.getElementById('panel');
            p.style.display = 'block';
            p.innerHTML = info[k];
            p.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
