<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho: A Rhetorical Constellation</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010105;
            font-family: 'Georgia', serif;
            color: #e0e0e0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Starfield & Background Layers */
        .stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            z-index: -20;
        }

        .goddess-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            opacity: 0.7;
            z-index: -10;
        }

        .edge-softener {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                transparent 40%, 
                rgba(1, 1, 5, 0.4) 70%, 
                rgba(1, 1, 5, 1) 100%);
            z-index: -5;
        }

        /* Layout */
        .scroll-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-style: italic; font-weight: normal;
            font-size: clamp(2.5rem, 8vw, 4rem);
            text-shadow: 0 0 30px rgba(170, 221, 255, 0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #aaddff;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 600px; 
            height: 650px;
            margin-bottom: 50px;
        }

        /* Node Styling */
        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
        }

        .star-dot {
            width: 14px; height: 14px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 15px white;
            margin: 0 auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Active/Hover states */
        .node:hover .star-dot, .node.active .star-dot {
            transform: scale(1.5);
            box-shadow: 0 0 25px #aaddff, 0 0 45px rgba(170, 221, 255, 0.8);
            background: #fff;
        }

        .label {
            display: block; margin-top: 15px;
            font-size: 0.75rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px black;
            font-weight: bold;
            color: #fff;
        }

        /* Node Placement */
        #n1 { top: 18.5%; left: 33%; }   
        #n2 { top: 31%; left: 42%; }      
        #n3 { top: 18%; left: 63%; }      
        #n4 { top: 86.5%; left: 44.5%; } 

        /* Writing Panel */
        #panel {
            max-width: 750px;
            margin: 20px auto 150px auto;
            padding: 45px;
            background: rgba(5, 5, 15, 0.85); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(170, 221, 255, 0.2);
            border-radius: 4px;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            line-height: 1.8;
        }

        h3 { 
            color: #aaddff; 
            font-size: 1.8rem; 
            margin-top: 0; 
            letter-spacing: 1px; 
            border-bottom: 1px solid rgba(170, 221, 255, 0.2);
            padding-bottom: 15px;
        }

        .note-block {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-left: 3px solid #aaddff;
            margin: 20px 0;
            font-style: italic;
            font-size: 0.95rem;
        }

        .nav-hint {
            display: inline-block;
            margin-top: 30px;
            color: #aaddff;
            text-decoration: none;
            border: 1px solid #aaddff;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-hint:hover {
            background: #aaddff;
            color: #010105;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.8s ease-in; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>
    <div class="goddess-layer"></div>
    <div class="edge-softener"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="subtitle">A Rhetorical Constellation</div>

        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos', this)"><div class="star-dot"></div><span class="label">Constitutive Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos', this)"><div class="star-dot"></div><span class="label">Ethos as Dwelling</span></div>
            <div class="node" id="n3" onclick="openNode('invite', this)"><div class="star-dot"></div><span class="label">Invitational</span></div>
            <div class="node" id="n4" onclick="openNode('agency', this)"><div class="star-dot"></div><span class="label">Audience Agency</span></div>
        </div>

        <div id="panel" class="fade-in"></div>
    </div>

    <script>
        const info = {
            logos: `
                <h3>I. Isocratean Constitutive Logos</h3>
                <div class="note-block">Writing Branch: Use Haskins to argue that Isocrates’ logos isn't just "speech," but a performative force that creates the demos.</div>
                <p>Focus here on how the audience is "called into being." If the audience doesn't exist until the speech begins, how does that change our view of persuasion?</p>
                <p><strong>Through-line:</strong> From the <em>creation</em> of a group to the <em>space</em> that group occupies.</p>
                <a href="javascript:void(0)" class="nav-hint" onclick="document.getElementById('n2').click()">Next: Ethos as Dwelling →</a>
            `,
            ethos: `
                <h3>II. Ethos: The Dwelling Place</h3>
                <div class="note-block">Writing Branch: Transition from the "community" (Logos) to the "site" (Ethos). Reference the Greek root <em>ethos</em> as a haunt or stall.</div>
                <p>Discuss how rhetoric creates a "dwelling place." Is this space inclusive? How does the "habit" of being together define the rhetoric used?</p>
                <p><strong>Through-line:</strong> If Ethos is a house, how do we invite others across the threshold?</p>
                <a href="javascript:void(0)" class="nav-hint" onclick="document.getElementById('n3').click()">Next: Invitational Rhetoric →</a>
            `,
            invite: `
                <h3>III. Feminist Invitational Rhetoric</h3>
                <div class="note-block">Writing Branch: Connect Foss & Griffin back to the "dwelling place." Argue that an invitation is the ultimate use of a shared space.</div>
                <p>Contrast this with "conquest rhetoric." How does Peitho (persuasion) transform when it becomes an invitation rather than an assault?</p>
                <p><strong>Through-line:</strong> Moving toward the final question of the audience's power to say "no."</p>
                <a href="javascript:void(0)" class="nav-hint" onclick="document.getElementById('n4').click()">Next: Audience Agency →</a>
            `,
            agency: `
                <h3>IV. The Question of Agency</h3>
                <div class="note-block">Writing Branch: This is your conclusion. Synthesize Haskins, Isocrates, and the Feminist critique.</div>
                <p>Answer your core question: Who gets to participate? On what terms? Does our rhetoric assume the audience is a target or a co-creator?</p>
                <p><strong>Theoretical Anchor:</strong> Reiterate Haskins’ view on the mythic/civic bridge as the ultimate site of agency.</p>
                <a href="javascript:void(0)" class="nav-hint" onclick="window.scrollTo(0,0)">Back to the Stars ↑</a>
            `
        };

        function openNode(key, element) {
            // UI Updates
            const panel = document.getElementById('panel');
            const nodes = document.querySelectorAll('.node');
            
            nodes.forEach(n => n.classList.remove('active'));
            element.classList.add('active');

            // Content Update
            panel.innerHTML = info[key];
            panel.style.display = 'block';
            
            // Smooth scroll to panel
            setTimeout(() => {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>
</html>
