<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        /* This kills any theme-injected backgrounds */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background: #010105 !important; /* Match your image's dark void */
            color: white;
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain; 
            z-index: 1; /* Move to front of the body, but behind content */
        }

        .content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
        }

        .map-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 600px; /* Adjust this if the dots are too high/low */
        }

        .star-node {
            position: absolute;
            cursor: pointer;
            transform: translate(-50%, -50%);
        }

        .dot {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px #aaddff;
        }

        .label {
            display: block;
            margin-top: 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px black;
        }

        /* Positions for 'Contain' scaling */
        #logos  { top: 15%; left: 32%; }
        #ethos  { top: 32%; left: 38%; }
        #invite { top: 25%; left: 18%; }
        #kairos { top: 85%; left: 45%; }

        #info-box {
            max-width: 500px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="content-layer">
        <h1>Recovering Peitho</h1>
        
        <div class="map-container">
            <div class="star-node" id="logos" onclick="show('logos')"><div class="dot"></div><span class="label">Logos</span></div>
            <div class="star-node" id="ethos" onclick="show('ethos')"><div class="dot"></div><span class="label">Ethos</span></div>
            <div class="star-node" id="invite" onclick="show('invite')"><div class="dot"></div><span class="label">Invitation</span></div>
            <div class="star-node" id="kairos" onclick="show('kairos')"><div class="dot"></div><span class="label">Kairos</span></div>
        </div>

        <div id="info-box"></div>
    </div>

    <script>
        const data = {
            logos: "<h3>Isocratean Logoi</h3><p>Energy of assembly calling community into being.</p>",
            ethos: "<h3>Ethos as Dwelling</h3><p>An open site where relation is the priority.</p>",
            invite: "<h3>Invitational Rhetoric</h3><p>Offering perspective rather than demanding compliance.</p>",
            kairos: "<h3>Kairos & Movement</h3><p>The 'right time' as a moment of welcome.</p>"
        };

        function show(key) {
            const box = document.getElementById('info-box');
            box.style.display = 'block';
            box.innerHTML = data[key];
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
