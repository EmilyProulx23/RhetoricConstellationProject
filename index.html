<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #05050a; /* Fallback color */
            font-family: 'Georgia', serif;
            color: white;
        }

        /* This fixes the image to the back and ensures it doesn't move */
        .goddess-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .main-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
        }

        h1 {
            font-style: italic;
            font-weight: normal;
            font-size: 3.5rem;
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
            margin-bottom: 20px;
        }

        .intro {
            line-height: 1.8;
            font-size: 1.2rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            margin-bottom: 60px;
            /* We removed the box entirely - just floating text */
        }

        /* The clickable stars */
        .map {
            position: relative;
            height: 500px;
            width: 100%;
        }

        .star {
            position: absolute;
            cursor: pointer;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff, 0 0 40px #aaddff;
            margin: 0 auto;
        }

        .label {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px black;
        }

        /* Star Placement */
        #s1 { top: 15%; left: 33%; }
        #s2 { top: 25%; left: 45%; }
        #s3 { top: 22%; left: 15%; }
        #s4 { top: 80%; left: 45%; }

        /* The box that appears when you click */
        #display-box {
            margin-top: 40px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.4); /* Very light see-through black */
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 5px black;
            display: none; 
            text-align: left;
        }

        .tension { color: #ffd1a4; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="goddess-bg"></div>

    <div class="main-content">
        <h1>Recovering Peitho</h1>
        
        <div class="intro">
            We move with Haskins away from Aristotle's objectified <em>to pithanon</em>. Instead, we navigate by <strong>Peitho</strong>: the ancient force that is unstable, gendered, seductive, and legitimate. Click the nodes to begin.
        </div>

        <div class="map">
            <div class="star" id="s1" onclick="reveal('isocrates')">
                <div class="dot"></div>
                <span class="label">Logos</span>
            </div>
            <div class="star" id="s2" onclick="reveal('ethos')">
                <div class="dot"></div>
                <span class="label">Ethos</span>
            </div>
            <div class="star" id="s3" onclick="reveal('invitational')">
                <div class="dot"></div>
                <span class="label">Invitation</span>
            </div>
            <div class="star" id="s4" onclick="reveal('kairos')">
                <div class="dot"></div>
                <span class="label">Kairos</span>
            </div>
        </div>

        <div id="display-box"></div>
    </div>

    <script>
        const content = {
            isocrates: "<h2>Isocratean Logoi</h2><p>Constitutive force that calls community into being. Peitho as the energy of assembly.</p><div class='tension'>Complexity: Isocrates’ 'dwelling' was elite and pan-Hellenic.</div>",
            ethos: "<h2>Ethos as Dwelling</h2><p>Shifting from 'credibility' to an open site where relation is paramount.</p>",
            invitational: "<h2>Invitational Rhetoric</h2><p>Foss & Griffin’s framework enacts the 'feminine' instability of Peitho.</p>",
            kairos: "<h2>Kairos & Movement</h2><p>The 'right time' shifting from persuasion to welcome.</p>"
        };

        function reveal(key) {
            const box = document.getElementById('display-box');
            box.style.display = 'block';
            box.innerHTML = content[key];
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
