<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho: A Rhetorical Constellation</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #0000000;
            font-family: 'Georgia', serif;
            color: #e0e0e0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Starfield & Background Layers */
        .stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            z-index: -20;
        }

        .goddess-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            opacity: 0.7;
            z-index: -10;
        }

        .edge-softener {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                transparent 40%, 
                rgba(1, 1, 5, 0.4) 70%, 
                rgba(1, 1, 5, 1) 100%);
            z-index: -5;
        }

        /* Layout */
        .scroll-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-style: italic; font-weight: normal;
            font-size: clamp(2.5rem, 8vw, 4rem);
            text-shadow: 0 0 30px rgba(170, 221, 255, 0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #aaddff;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 600px; 
            height: 650px;
            margin-bottom: 50px;
        }

        /* Node Styling */
        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
        }

        .star-dot {
            width: 14px; height: 14px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 15px white;
            margin: 0 auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Active/Hover states */
        .node:hover .star-dot, .node.active .star-dot {
            transform: scale(1.5);
            box-shadow: 0 0 25px #aaddff, 0 0 45px rgba(170, 221, 255, 0.8);
            background: #fff;
        }

        .label {
            display: block; margin-top: 15px;
            font-size: 0.75rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px black;
            font-weight: bold;
            color: #fff;
        }

        /* Node Placement */
        #n1 { top: 18.5%; left: 33%; }   
        #n2 { top: 31%; left: 42%; }      
        #n3 { top: 18%; left: 63%; }      
        #n4 { top: 86.5%; left: 44.5%; } 

        /* Writing Panel */
        #panel {
            max-width: 750px;
            margin: 20px auto 150px auto;
            padding: 45px;
            background: rgba(5, 5, 15, 0.85); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(170, 221, 255, 0.2);
            border-radius: 4px;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            line-height: 1.8;
        }

        h3 { 
            color: #aaddff; 
            font-size: 1.8rem; 
            margin-top: 0; 
            letter-spacing: 1px; 
            border-bottom: 1px solid rgba(170, 221, 255, 0.2);
            padding-bottom: 15px;
        }

        .note-block {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-left: 3px solid #aaddff;
            margin: 20px 0;
            font-style: italic;
            font-size: 0.95rem;
        }

        .nav-hint {
            display: inline-block;
            margin-top: 30px;
            color: #aaddff;
            text-decoration: none;
            border: 1px solid #aaddff;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-hint:hover {
            background: #aaddff;
            color: #010105;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.8s ease-in; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>
    <div class="goddess-layer"></div>
    <div class="edge-softener"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="subtitle">A Rhetorical Constellation</div>

        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos', this)"><div class="star-dot"></div><span class="label">Constitutive Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos', this)"><div class="star-dot"></div><span class="label">Ethos as Dwelling</span></div>
            <div class="node" id="n3" onclick="openNode('invite', this)"><div class="star-dot"></div><span class="label">Invitational</span></div>
            <div class="node" id="n4" onclick="openNode('agency', this)"><div class="star-dot"></div><span class="label">Audience Agency</span></div>
        </div>

        <div id="panel" class="fade-in"></div>
    </div>

    <script>
        const info = {
    logos: `<h3>Logos: The Performative Force of Assembly</h3>
            <p>To understand Isocrates’ <em>logos</em>, one must first dismantle the Aristotelian definition that has dominated Western thought for centuries. As Haskins notes in <em>Chapter Four</em>, Aristotle "neutralizes the oral performative dimensions of discursive practice by stressing the propositional content". For Aristotle, rhetoric is a tool used to relay a message that exists independently of the speaker. However, in the Isocratean tradition, logos is a <strong>performative force</strong>. It is not merely "speech" used to describe a reality; it is the energy that <em>creates</em> reality.</p>
            
            <p>This brings us to the central paradox of the Isocratean <em>demos</em>: the audience does not exist until the speech begins. Aristotle assumes a "natural priority" within the polis, where people are already categorized into pre-existing social roles by nature. In this "given grid," the rhetorician simply speaks to a group that is already there. Isocrates rejects this. He approaches his audience as a "community to be called into existence". The act of speaking—the performance of the logos—is what "goads" individuals into a cultural collectivity. Persuasion, then, is not the act of changing a person’s mind, but the act of <strong>inviting</strong> them into a new identity as a member of a community.</p>
            
            <p>This creates a profound shift in how we view the power of the rhetor. Rather than a masculine force of dominance or mastery over an audience, Isocratean logos is an act of <strong>assembly</strong>. It draws upon a "diverse repertoire of speech genres" to respond to "historically unique occasions" rather than conforming to rigid Aristotelian genres. In this sense, logos is the "creator of culture" and a source of cultural critique. It is the through-line from the creation of a group to the actual space that group occupies. When we "Recover Peitho," we are recovering this unstable, creative power of logos to call a world into being where none existed before.</p>
            
            <p>If we accept that the audience is "constituted and sustained through discourse," we must realize that rhetoric is a <em>techne</em> of life itself. As Atwill argues for the resurgence of techne, we see that Isocrates’ pedagogy was not about deception, but about conditioning "students’ moral behavior so that they would think and speak noble, virtuous ideas". By focusing on the performative rather than the propositional, we move rhetoric back into the realm of the mythopoetic—a space where language is magic, and magic creates the demos.</p>`,
            
    ethos: `<h3>Ethos: The Site of Dwelling and Community Identity</h3>
            <p>Ethos is often reduced to "credibility" or a set of boxes to tick to prove one’s authority. However, using Haskins’ comparison, we see that Aristotelian ethos is about representing social roles that are already "given". Aristotle "disciplines" the rhetorical transaction by assigning specific ends and topics to specific people. In contrast, Isocratean ethos is an <strong>open site of dwelling</strong>. It is not something you <em>have</em>; it is a way of being that you <em>perform</em>.</p>
            
            <p>Isocrates co-opts the "oral resources of the mythopoetic tradition" to construct an identity of the "citizen-rhetor" through textual performance. This isn't about proving you are right; it is about proving you belong to the community you are calling into being. As Kennedy notes in his introduction to Aristotle, rhetoric can be seen as "mental or emotional energy". In Isocrates, this energy is used to "condition" the speaker’s own character so they can implement "noble, virtuous ideas in civic policy".</p>
            
            <p>This is where the connection to <strong>Feminist Invitational Rhetoric</strong> becomes clear. If ethos is a "dwelling," it is a space of relation. While Aristotle’s model is one of "natural priority" (some are born to lead, others to follow), the Isocratean model is one of <strong>relation-building</strong>. There is no <em>a priori</em> structure here; the social roles of both the speaker and the audience are "constituted and sustained through discourse". This aligns with the idea that the "Platonic Paradox" involves the canons of memory and delivery—rhetoric is a lived, embodied practice.</p>
            
            <p>By viewing ethos as a performative site, we reclaim the "Peitho" that Blake and the Sophists recognized: a force that is "unstable, gendered, and seductive." It is seductive because it invites the listener into a shared space. It is unstable because it relies on the performance of the moment rather than a rigid, "natural" social hierarchy. As Isocrates defends logos as both a "creator of culture and the source of individualized acts of cultural critique," he provides a framework for a rhetoric that is both pedagogical and deeply political. It is a rhetoric that asks: "How can we dwell together?" rather than "How can I master you?"</p>`,
            
    invite: `<h3>Invitation: Reclaiming Peitho as Techne</h3>
             <p>The "Recovery of Peitho" requires a rejection of rhetoric as "deception and flattery." As Isocrates sought to show, rhetoric can be a tool for implementation of civic policy through noble thought. This is the essence of <strong>Invitational Rhetoric</strong>. While Aristotle focuses on "logical argument" and "historical facts," Isocrates is often criticized for his "obsession with techniques of amplification and smoothness of style". But this "smoothness" is exactly what allows for the invitation to occur. It is the aesthetic force that makes the "calling into being" possible.</p>
             
             <p>As Atwill argues in <em>Rhetoric Reclaimed</em>, we must see rhetoric as a <strong>techne</strong>—a craft that navigates the "unstable" and the "gendered". Peitho, as the goddess of persuasion, was never about logical syllogisms; she was about the "seductive" pull of community. In Isocrates, this is manifest in his "far more expansive view of rhetoric". He doesn't just want to win a debate in a "rhetorical forum"; he wants to respond to the "historically unique occasions" of his time.</p>
             
             <p>This is a rhetoric of <strong>Welcome</strong>. If, as Haskins argues, the Isocratean speaker "draws upon the diverse repertoire of speech genres," they are effectively creating a constellation of ideas for the audience to inhabit. This "mental or emotional energy" (Kennedy) is not directed at an object (the audience), but is shared within a field. It is the movement from the "Creation of a Group" to the "Space that group occupies." In this space, memory and delivery (Welch) become the vital tools of connection.</p>
             
             <p>Ultimately, to recover Peitho is to recover the Sophistic belief that we are not bound by "natural social roles" or "natural priorities". We are bound by the <em>logoi</em> we choose to perform. By inviting the audience to join in the creation of a cultural collectivity, the rhetorician ceases to be a master and becomes a co-creator of the demos. This is the "good idea" Blake saw: a constellation where Aristotle's masculine mastery gives way to a feminist, Isocratean invitation.</p>`,

    kairos: `<h3>Kairos: The Moment of Welcome and Movement</h3>
             <p>Kairos is the "right time," but in the Isocratean sense, it is also the "right space" for a community to be born. Unlike Aristotle, who "disciplines" rhetoric by assigning it to specific genres and forums, Isocrates sees kairos as a "historically unique occasion" that demands a unique response. It is the moment when the "performative force" of logos is most potent. As Kennedy mentions, the context of ancient Greece—always at war or in competition—allowed this "energy" to develop because decisions were made "after debate in an assembly".</p>
             
             <p>But what if the assembly isn't there yet? That is the power of Kairos. It is the moment of <strong>Goading</strong>. Haskins notes that Isocrates uses his textual performance to "goad people toward a cultural collectivity". This movement is the "energy imparted to a communication" that Kennedy describes. It is not just about "affecting a situation," but about <em>starting</em> a situation. It is the "source of individualized acts of cultural critique" that allows a community to shift and change.</p>
             
             <p>This "movement" is the through-line of your project. From the "Creation of a Group" to the "Space that group occupies," Kairos is the bridge. It is the "emotional energy" that makes the audience feel that they *belong* to this specific moment. This is how rhetoric is a "feature of all human communication," and why it was established as a "distinct area of study". It is the study of how we move through time together.</p>
             
             <p>By focusing on Kairos, we see that persuasion is not a static act of logic, but a <strong>dynamic act of welcome</strong>. It is the "invitational" moment where the "masculine" constellation of fixed points is set into motion. As you "constellate" your ideas, remember that each node is a Kairotic moment—an opportunity to invite the reader into the "Recovering Peitho" community. This is the Isocratean vision adapted for today’s "discursive education": a way to create a community of cultural critique in a context that is "so different from classical Athens".</p>`
};
        function openNode(key, element) {
            // UI Updates
            const panel = document.getElementById('panel');
            const nodes = document.querySelectorAll('.node');
            
            nodes.forEach(n => n.classList.remove('active'));
            element.classList.add('active');

            // Content Update
            panel.innerHTML = info[key];
            panel.style.display = 'block';
            
            // Smooth scroll to panel
            setTimeout(() => {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>
</html>
