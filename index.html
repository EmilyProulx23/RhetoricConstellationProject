<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        /* This ensures the ENTIRE page allows the background to show through */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: transparent; /* No more black filler */
            font-family: 'Georgia', serif;
            color: white;
        }

        /* The background image stays fixed and fills the screen */
        .goddess-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* The container for your text and stars - NO background color */
        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh; /* Takes up at least the full screen */
            background: transparent; /* Force transparency */
        }

        .content-inner {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-style: italic;
            font-weight: normal;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
            margin-top: 0;
        }

        .intro {
            line-height: 1.8;
            font-size: 1.2rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            margin-bottom: 30px;
        }

        .map-area {
            position: relative;
            height: 500px; /* This is the space where the dots live */
            width: 100%;
        }

        .star-node {
            position: absolute;
            cursor: pointer;
        }

        .star-point {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px #aaddff;
            margin: 0 auto;
        }

        .star-label {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px black;
        }

        /* Adjust these percentages to move dots over the image */
        #logos   { top: 10%; left: 45%; }
        #ethos   { top: 25%; left: 55%; }
        #invite  { top: 20%; left: 25%; }
        #kairos  { top: 75%; left: 48%; }

        #display-text {
            margin-top: 40px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.4); /* Very thin tint for readability */
            backdrop-filter: blur(5px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
            text-align: left;
            text-shadow: 1px 1px 4px black;
        }

        .tension { color: #ffd1a4; margin-top: 15px; font-style: italic; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="goddess-bg"></div>

    <div class="main-wrapper">
        <div class="content-inner">
            <h1>Recovering Peitho</h1>
            
            <div class="intro">
                We move with Haskins away from Aristotle's objectified <em>to pithanon</em>. Instead, we navigate by <strong>Peitho</strong>: the ancient force that is unstable, gendered, seductive, and legitimate.
            </div>

            <div class="map-area">
                <div class="star-node" id="logos" onclick="update('logos')">
                    <div class="star-point"></div>
                    <span class="star-label">Logos</span>
                </div>
                <div class="star-node" id="ethos" onclick="update('ethos')">
                    <div class="star-point"></div>
                    <span class="star-label">Ethos</span>
                </div>
                <div class="star-node" id="invite" onclick="update('invite')">
                    <div class="star-point"></div>
                    <span class="star-label">Invitation</span>
                </div>
                <div class="star-node" id="kairos" onclick="update('kairos')">
                    <div class="star-point"></div>
                    <span class="star-label">Kairos</span>
                </div>
            </div>

            <div id="display-text"></div>
        </div>
    </div>

    <script>
        const info = {
            logos: "<h3>Isocratean Logoi</h3><p>Logos calls community into being. Peitho as the energy of assembly.</p><div class='tension'>Complexity: Isocrates’ 'dwelling' was elite and exclusionary.</div>",
            ethos: "<h3>Ethos as Dwelling</h3><p>Shifting from ethos as 'credibility' to an open site where relation is paramount.</p>",
            invite: "<h3>Invitational Rhetoric</h3><p>A recovery of the feminine instability of Peitho, offering perspective rather than demanding compliance.</p>",
            kairos: "<h3>Kairos & Movement</h3><p>The 'right time' shifting from persuasion to a moment of welcome.</p>"
        };

        function update(key) {
            const box = document.getElementById('display-text');
            box.style.display = 'block';
            box.innerHTML = info[key];
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
