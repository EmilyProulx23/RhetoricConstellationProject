<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        /* 1. The ONLY place with a background is the body */
        body {
            margin: 0;
            padding: 0;
            /* This puts the image at the very bottom layer */
            background: url('peitho-constellation.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Georgia', serif;
            color: white;
            min-height: 100vh;
        }

        /* 2. Make the container completely invisible/clear */
        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            background: transparent !important; /* Forces it to be clear */
        }

        h1 {
            text-align: center;
            font-style: italic;
            font-weight: normal;
            font-size: 3.5rem;
            /* Shadow makes white text pop against the star image */
            text-shadow: 0 0 15px black, 0 0 30px black;
            margin-top: 0;
        }

        .intro-text {
            text-align: center;
            line-height: 1.8;
            font-size: 1.2rem;
            text-shadow: 2px 2px 10px black;
            margin-bottom: 50px;
            background: transparent !important; /* No black box behind intro */
        }

        /* 3. The Star Map Area */
        .constellation-map {
            position: relative;
            height: 500px;
            width: 100%;
            background: transparent !important;
        }

        .star-node {
            position: absolute;
            cursor: pointer;
            text-align: center;
        }

        .glow-dot {
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px white, 0 0 40px #aaddff;
            margin: 0 auto;
        }

        .star-name {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px black;
        }

        /* Adjusting positions based on your image */
        #star-logos { top: 15%; left: 45%; }
        #star-ethos { top: 30%; left: 55%; }
        #star-invite { top: 22%; left: 20%; }
        #star-kairos { top: 80%; left: 48%; }

        /* 4. The Info Display - only a tiny bit of dark tint for reading */
        #display-panel {
            margin-top: 40px;
            padding: 30px;
            /* This is a very light 'smoke' effect so you can still see the image through it */
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            text-align: left;
            text-shadow: 1px 1px 5px black;
        }

        .tension {
            color: #ffd1a4;
            margin-top: 20px;
            font-style: italic;
            border-left: 2px solid #ffd1a4;
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Recovering Peitho</h1>
        
        <div class="intro-text">
            Navigating the ancient force that is unstable, gendered, seductive, and legitimate. 
            Click the glowing stars to trace the recovery.
        </div>

        <div class="constellation-map">
            <div class="star-node" id="star-logos" onclick="reveal('logos')">
                <div class="glow-dot"></div>
                <span class="star-name">Logos</span>
            </div>
            <div class="star-node" id="star-ethos" onclick="reveal('ethos')">
                <div class="glow-dot"></div>
                <span class="star-name">Ethos</span>
            </div>
            <div class="star-node" id="star-invite" onclick="reveal('invite')">
                <div class="glow-dot"></div>
                <span class="star-name">Invitation</span>
            </div>
            <div class="star-node" id="star-kairos" onclick="reveal('kairos')">
                <div class="glow-dot"></div>
                <span class="star-name">Kairos</span>
            </div>
        </div>

        <div id="display-panel"></div>
    </div>

    <script>
        const contentMap = {
            logos: "<h2>Isocratean Logoi</h2><p>Logos calls community into being. Peitho as the energy of assembly.</p><div class='tension'>Complexity: Isocrates’ 'dwelling' was elite and pan-Hellenic.</div>",
            ethos: "<h2>Ethos as Dwelling</h2><p>Shifting from ethos as 'credibility' to an open site where relation is paramount.</p>",
            invite: "<h2>Invitational Rhetoric</h2><p>A recovery of the feminine instability of Peitho, offering rather than demanding.</p>",
            kairos: "<h2>Kairos & Movement</h2><p>The 'right time' shifting from persuasion to a moment of welcome.</p>"
        };

        function reveal(key) {
            const panel = document.getElementById('display-panel');
            panel.style.display = 'block';
            panel.innerHTML = contentMap[key];
            panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
