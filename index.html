<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010105;
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        /* Generic starfield for the "bars" extension */
        .stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            z-index: -20;
        }

        .goddess-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            z-index: -10;
        }

        .edge-softener {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                transparent 45%, 
                rgba(1, 1, 5, 0.3) 65%, 
                rgba(1, 1, 5, 1) 98%);
            z-index: -5;
        }

        .scroll-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            font-style: italic; font-weight: normal;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
            margin-bottom: 20px;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 540px; 
            height: 600px;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
        }

        @keyframes twinkle {
            0% { transform: scale(1); box-shadow: 0 0 10px white; }
            50% { transform: scale(1.25); box-shadow: 0 0 25px #aaddff, 0 0 45px rgba(170, 221, 255, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 10px white; }
        }

        .star-dot {
            width: 12px; height: 12px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 15px white;
            animation: twinkle 4s infinite ease-in-out;
        }

        #n1 .star-dot { animation-delay: 0s; }
        #n2 .star-dot { animation-delay: 1s; }
        #n3 .star-dot { animation-delay: 2s; }
        #n4 .star-dot { animation-delay: 3s; }

        .label {
            display: block; margin-top: 12px;
            /* LARGER TEXT HERE */
            font-size: 0.85rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 12px black, 0 0 8px rgba(255,255,255,0.3);
            font-weight: bold;
        }

        /* UPDATED PRECISION ALIGNMENT */
        #n1 { top: 18.5%; left: 33%; }   /* Logos - Head area */
        #n2 { top: 31%; left: 42%; }     /* Ethos - Heart/Chest */
        #n3 { top: 18%; left: 63%; }     /* Invitation - Far Right Hand */
        #n4 { top: 86.5%; left: 44.5%; } /* Kairos - Lower Ankle star */

        /* ULTRA TRANSPARENT INFO BOX */
        #panel {
            max-width: 500px;
            margin: 40px 0 100px 0;
            padding: 30px;
            /* Very sheer background */
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(15px); /* Strong blur makes text readable over busy stars */
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.7s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin-top: 0; font-weight: normal; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        p { line-height: 1.7; font-size: 1.05rem; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>
    <div class="goddess-layer"></div>
    <div class="edge-softener"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos')"><div class="star-dot"></div><span class="label">Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos')"><div class="star-dot"></div><span class="label">Ethos</span></div>
            <div class="node" id="n3" onclick="openNode('invite')"><div class="star-dot"></div><span class="label">Invitation</span></div>
            <div class="node" id="n4" onclick="openNode('kairos')"><div class="star-dot"></div><span class="label">Kairos</span></div>
        </div>
        <div id="panel"></div>
    </div>

    <script>
        const info = {
            logos: "<h3>Logos</h3><p>Peitho as a force of association rather than a tool of manipulation. The energy of assembly that calls community into being.</p>",
            ethos: "<h3>Ethos</h3><p>Moving from 'credibility' to an open site where relation is the priority. Ethos is where we dwell together in the instability of persuasion.</p>",
            invite: "<h3>Invitation</h3><p>Offering perspective rather than demanding compliance. A recovery of the feminine, seductive, and welcome power of Peitho.</p>",
            kairos: "<h3>Kairos</h3><p>The 'right time' shifting from a strategic opening to a moment of welcome. This node marks rhetoric in its most fluid motion.</p>"
        };

        function openNode(k) {
            const p = document.getElementById('panel');
            p.style.display = 'block';
            p.innerHTML = info[k];
            p.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
