<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        :root {
            --accent: #b3d9ff;
            --glass: rgba(0, 0, 0, 0.65);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #05050a;
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        /* This makes the image cover the WHOLE background */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1; /* Puts it behind everything */
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header h1 {
            text-align: center;
            font-weight: normal;
            font-style: italic;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0,0,0,0.9);
        }

        .intro-text {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 50px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        /* Positioning the constellation points directly on her */
        .constellation-area {
            position: relative;
            height: 500px;
            width: 100%;
            margin-bottom: 50px;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px var(--accent);
            margin: 0 auto;
        }

        .label {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px black;
            opacity: 0.8;
        }

        .node:hover .dot {
            transform: scale(1.4);
            background: var(--accent);
        }

        /* Adjusted positions for the goddess image */
        #node1 { top: 15%; left: 33%; } /* Head area */
        #node2 { top: 25%; left: 45%; } /* Chest area */
        #node3 { top: 22%; left: 15%; } /* The glowing orb hand */
        #node4 { top: 80%; left: 45%; } /* Feet/Movement */

        .content-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 200px;
            margin-bottom: 100px;
            display: none; /* Hidden until click */
        }

        .tension-insight {
            margin-top: 20px;
            border-left: 3px solid #ffd1a4;
            padding-left: 15px;
            color: #ffd1a4;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="container">
        <header>
            <h1>Recovering Peitho</h1>
        </header>

        <div class="intro-text">
            We move with Haskins away from Aristotle's objectified <em>to pithanon</em>. Instead, we navigate by <strong>Peitho</strong>: the ancient force that is unstable, gendered, seductive, and legitimate. Click the nodes within the constellation to begin.
        </div>

        <div class="constellation-area">
            <div class="node" id="node1" onclick="showContent('isocrates')">
                <div class="dot"></div>
                <span class="label">Logos</span>
            </div>
            <div class="node" id="node2" onclick="showContent('ethos')">
                <div class="dot"></div>
                <span class="label">Ethos</span>
            </div>
            <div class="node" id="node3" onclick="showContent('invitational')">
                <div class="dot"></div>
                <span class="label">Invitation</span>
            </div>
            <div class="node" id="node4" onclick="showContent('kairos')">
                <div class="dot"></div>
                <span class="label">Kairos</span>
            </div>
        </div>

        <div id="content-display" class="content-box">
            </div>
    </div>

    <script>
        const data = {
            isocrates: {
                title: "Isocratean Logoi",
                text: "In this recovery, Logos is the constitutive force that calls community into being. Peitho is the energy that makes gathering possible.",
                tension: "Complexity: Isocrates' 'invitation' was for the elite. His dwelling place had walls."
            },
            ethos: {
                title: "Ethos as Dwelling",
                text: "Shifting from 'credibility' to 'site.' We look at the space rhetoric creates for us to inhabit together.",
                tension: ""
            },
            invitational: {
                title: "Invitational Rhetoric",
                text: "A recovery of the feminine force of Peitho. It is an offering of perspective rather than a demand for compliance.",
                tension: ""
            },
            kairos: {
                title: "Kairos & Movement",
                text: "Rhetoric in motion. How does the 'right time' feel when persuasion is moving toward the listener rather than at them?",
                tension: ""
            }
        };

        function showContent(key) {
            const display = document.getElementById('content-display');
            const item = data[key];
            
            display.style.display = 'block';
            display.innerHTML = `
                <h2>${item.title}</h2>
                <p>${item.text}</p>
                ${item.tension ? `<div class="tension-insight"><strong>Note:</strong> ${item.tension}</div>` : ''}
            `;
            
            display.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
