<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #05050a; /* Deep space black for the 'bars' on the side */
            font-family: 'Georgia', serif;
            color: white;
        }

        /* Fixed Background - Set to CONTAIN */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain; /* This shows the whole image */
            z-index: -10;
        }

        .scroll-container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-style: italic;
            font-weight: normal;
            font-size: clamp(1.8rem, 5vw, 3rem);
            text-shadow: 0 0 15px black;
            margin-top: 20px;
        }

        .intro {
            max-width: 600px;
            text-align: center;
            line-height: 1.5;
            text-shadow: 1px 1px 5px black;
            margin: 10px 0 30px 0;
            font-size: 1rem;
        }

        /* Interactive Area */
        .map {
            position: relative;
            width: 100%;
            max-width: 600px; /* Narrower to match the 'contained' image width */
            height: 70vh; /* Scaled to the viewport */
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%); /* Centers the dot on the coordinate */
        }

        .star {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px #aaddff;
        }

        .name {
            display: block;
            margin-top: 8px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px black;
            white-space: nowrap;
        }

        /* RE-MAPPED COORDINATES for the 'contained' image */
        #n1 { top: 15%; left: 32%; } /* Crown/Logos */
        #n2 { top: 35%; left: 38%; } /* Heart/Ethos */
        #n3 { top: 25%; left: 18%; } /* Hand/Invitation */
        #n4 { top: 85%; left: 45%; } /* Feet/Kairos */

        #panel {
            max-width: 500px;
            margin: 20px 0 100px 0;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <p class="intro">Navigating the rhetorical constellation of movement and invitation.</p>

        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos')"><div class="star"></div><span class="name">Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos')"><div class="star"></div><span class="name">Ethos</span></div>
            <div class="node" id="n3" onclick="openNode('invite')"><div class="star"></div><span class="name">Invitation</span></div>
            <div class="node" id="n4" onclick="openNode('kairos')"><div class="star"></div><span class="name">Kairos</span></div>
        </div>

        <div id="panel"></div>
    </div>

    <script>
        const info = {
            logos: "<h3>Isocratean Logoi</h3><p>The energy of assembly that calls community into being.</p>",
            ethos: "<h3>Ethos as Dwelling</h3><p>An open site where relation is the priority over expertise.</p>",
            invite: "<h3>Invitational Rhetoric</h3><p>Offering perspective rather than demanding compliance.</p>",
            kairos: "<h3>Kairos & Movement</h3><p>The right time shifting from persuasion to a moment of welcome.</p>"
        };

        function openNode(k) {
            const p = document.getElementById('panel');
            p.style.display = 'block';
            p.innerHTML = info[k];
            p.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
