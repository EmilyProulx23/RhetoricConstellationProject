<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #0000000;
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        /* LAYER 1: A wide, generic starfield to fill the screen */
        .stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            z-index: -20;
        }

        /* LAYER 2: Your Goddess, centered once, no repeats */
        .goddess-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            z-index: -10;
        }

        /* LAYER 3: The Blend (Hides the 'box' edges of Peitho) */
        .edge-softener {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                transparent 40%, 
                rgba(1, 1, 5, 0.5) 60%, 
                rgba(1, 1, 5, 1) 95%);
            z-index: -5;
        }

        .scroll-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            font-style: italic; font-weight: normal;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
            margin-bottom: 20px;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 540px; 
            height: 600px;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease;
        }
        .node:hover { transform: translate(-50%, -50%) scale(1.2); }

        .star-dot {
            width: 12px; height: 12px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px #aaddff;
        }

        .label {
            display: block; margin-top: 8px;
            font-size: 0.65rem; letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px black;
        }

        /* Adjusted positions for the centered figure */
        #n1 { top: 18.5%; left: 45%; } /* Logos */
        #n2 { top: 38%; left: 48.5%; } /* Ethos */
        #n3 { top: 28.5%; left: 16%; } /* Invitation */
        #n4 { top: 82.5%; left: 46%; } /* Kairos */

        #panel {
            max-width: 550px;
            margin-top: 40px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>
    <div class="goddess-layer"></div>
    <div class="edge-softener"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos')"><div class="star-dot"></div><span class="label">Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos')"><div class="star-dot"></div><span class="label">Ethos</span></div>
            <div class="node" id="n3" onclick="openNode('invite')"><div class="star-dot"></div><span class="label">Invitation</span></div>
            <div class="node" id="n4" onclick="openNode('kairos')"><div class="star-dot"></div><span class="label">Kairos</span></div>
        </div>
        <div id="panel"></div>
    </div>

    <script>
        const info = {
            logos: "<h3>Isocratean Logoi</h3><p>The energy of assembly that calls community into being.</p>",
            ethos: "<h3>Ethos as Dwelling</h3><p>An open site where relation is the priority.</p>",
            invite: "<h3>Invitational Rhetoric</h3><p>Offering perspective rather than demanding compliance.</p>",
            kairos: "<h3>Kairos & Movement</h3><p>The 'right time' as a moment of welcome.</p>"
        };

        function openNode(k) {
            const p = document.getElementById('panel');
            p.style.display = 'block';
            p.innerHTML = info[k];
            p.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
