<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #010105;
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        /* LAYER 1: The "Extra Stars" on the sides */
        .stars-extension {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') repeat;
            background-size: contain;
            filter: blur(4px) brightness(0.4); /* Makes side stars subtle so they don't distract */
            z-index: -20;
        }

        /* LAYER 2: The actual Goddess, centered and clear */
        .goddess-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            z-index: -10;
        }

        /* LAYER 3: The Blend (Hides the 'edges' of the center image) */
        .blend-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* This fades the center goddess into the side stars seamlessly */
            background: linear-gradient(to right, 
                #010105 0%, 
                transparent 25%, 
                transparent 75%, 
                #010105 100%);
            z-index: -5;
        }

        .scroll-container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-style: italic;
            font-weight: normal;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
            margin-bottom: 20px;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 540px; 
            height: 600px;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
        }

        .star-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px white, 0 0 30px #aaddff;
        }

        .label {
            display: block;
            margin-top: 8px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px black;
            white-space: nowrap;
        }

        /* Dots aligned to her figure */
        #n1 { top: 18%; left: 45%; } /* Logos */
        #n2 { top: 38%; left: 48%; } /* Ethos */
        #n3 { top: 28%; left: 16%; } /* Invitation */
        #n4 { top: 82%; left: 45%; } /* Kairos */

        #panel {
            max-width: 550px;
            margin-top: 40px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="stars-extension"></div>
    <div class="goddess-main"></div>
    <div class="blend-mask"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos')"><div class="star-dot"></div><span class="label">Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos')"><div class="star-dot"></div><span class="label">Ethos</span></div>
            <div class="node" id="n3" onclick="openNode('invite')"><div class="star-dot"></div><span class="label">Invitation</span></div>
            <div class="node" id="n4" onclick="openNode('kairos')"><div class="star-dot"></div><span class="label">Kairos</span></div>
        </div>
        <div id="panel"></div>
    </div>

    <script>
        const info = {
            logos: "<h3>Isocratean Logoi</h3><p>The energy of assembly that calls community into being.</p>",
            ethos: "<h3>Ethos as Dwelling</h3><p>An open site where relation is the priority.</p>",
            invite: "<h3>Invitational Rhetoric</h3><p>Offering perspective rather than demanding compliance.</p>",
            kairos: "<h3>Kairos & Movement</h3><p>The 'right time' as a moment of welcome.</p>"
        };

        function openNode(k) {
            const p = document.getElementById('panel');
            p.style.display = 'block';
            p.innerHTML = info[k];
            p.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
