<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #05050a;
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        /* The goddess stays fixed in the back */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-style: italic;
            font-weight: normal;
            font-size: 3rem;
            /* This shadow makes text readable over ANY background */
            text-shadow: 0 0 10px black, 0 0 20px black;
        }

        .intro-text {
            /* NO background color here, just a thin border */
            border: 1px solid rgba(255,255,255,0.3);
            padding: 30px;
            border-radius: 15px;
            line-height: 1.8;
            font-size: 1.2rem;
            text-shadow: 2px 2px 8px black;
            margin-bottom: 40px;
            /* Optional: very light tint just to help readability */
            background: rgba(0,0,0,0.2); 
        }

        .constellation-area {
            position: relative;
            height: 500px;
            width: 100%;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px #aaddff;
        }

        .label {
            display: block;
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px black;
        }

        /* Positions */
        #node-1 { top: 15%; left: 33%; }
        #node-2 { top: 25%; left: 45%; }
        #node-3 { top: 22%; left: 15%; }
        #node-4 { top: 80%; left: 45%; }

        .content-box {
            margin-top: 50px;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.5);
            text-shadow: 2px 2px 10px black;
            display: none;
            /* Again, very light tint */
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .tension {
            color: #ffd1a4;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="container">
        <h1>Recovering Peitho</h1>
        
        <div class="intro-text">
            We move with Haskins away from Aristotle's objectified <em>to pithanon</em>. Instead, we navigate by <strong>Peitho</strong>: the ancient force that is unstable, gendered, seductive, and legitimate. Click the nodes to begin.
        </div>

        <div class="constellation-area">
            <div class="node" id="node-1" onclick="show('isocrates')">
                <div class="dot"></div>
                <span class="label">Logos</span>
            </div>
            <div class="node" id="node-2" onclick="show('ethos')">
                <div class="dot"></div>
                <span class="label">Ethos</span>
            </div>
            <div class="node" id="node-3" onclick="show('invitational')">
                <div class="dot"></div>
                <span class="label">Invitation</span>
            </div>
            <div class="node" id="node-4" onclick="show('kairos')">
                <div class="dot"></div>
                <span class="label">Kairos</span>
            </div>
        </div>

        <div id="display" class="content-box"></div>
    </div>

    <script>
        const info = {
            isocrates: "<strong>Isocratean Logoi:</strong> Moving from Aristotle’s forensic discipline, Isocrates suggests Logos calls community into being. <div class='tension'>Complexity: Isocrates’ 'dwelling' was elite and pan-Hellenic.</div>",
            ethos: "<strong>Ethos as Dwelling:</strong> Shifting from ethos as 'credibility' to an open site where relation is paramount.",
            invitational: "<strong>Invitational Rhetoric:</strong> Foss & Griffin’s framework enacts the 'feminine' instability of Peitho.",
            kairos: "<strong>Kairos & Movement:</strong> How does the 'right time' shift when the goddess is moving toward the listener in welcome?"
        };

        function show(key) {
            const el = document.getElementById('display');
            el.style.display = 'block';
            el.innerHTML = info[key];
            el.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
