<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho: A Rhetorical Constellation</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #0000000;
            font-family: 'Kamala', serif;
            color: #e0e0e0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Starfield & Background Layers */
        .stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            z-index: -20;
        }

        .goddess-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            opacity: 0.7;
            z-index: -10;
        }

        .edge-softener {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                transparent 40%, 
                rgba(1, 1, 5, 0.4) 70%, 
                rgba(1, 1, 5, 1) 100%);
            z-index: -5;
        }

        /* Layout */
        .scroll-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-style: italic; font-weight: normal;
            font-size: clamp(2.5rem, 8vw, 4rem);
            text-shadow: 0 0 30px rgba(170, 221, 255, 0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #aaddff;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 600px; 
            height: 650px;
            margin-bottom: 50px;
        }

        /* Node Styling */
        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
        }

        .star-dot {
            width: 14px; height: 14px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 15px white;
            margin: 0 auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Active/Hover states */
        .node:hover .star-dot, .node.active .star-dot {
            transform: scale(1.5);
            box-shadow: 0 0 25px #aaddff, 0 0 45px rgba(170, 221, 255, 0.8);
            background: #fff;
        }

        .label {
            display: block; margin-top: 15px;
            font-size: 0.75rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px black;
            font-weight: bold;
            color: #fff;
        }

        /* Node Placement */
        #n1 { top: 15%; left: 20%; }   
        #n2 { top: 31%; left: 30%; }      
        #n3 { top: 18%; left: 63%; }      
        #n4 { top: 86.5%; left: 90%; } 

        /* Writing Panel */
        #panel {
            max-width: 750px;
            margin: 20px auto 150px auto;
            padding: 45px;
            background: rgba(5, 5, 15, 0.85); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(170, 221, 255, 0.2);
            border-radius: 4px;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            line-height: 1.8;
        }

        h3 { 
            color: #aaddff; 
            font-size: 1.8rem; 
            margin-top: 0; 
            letter-spacing: 1px; 
            border-bottom: 1px solid rgba(170, 221, 255, 0.2);
            padding-bottom: 15px;
        }

        .note-block {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-left: 3px solid #aaddff;
            margin: 20px 0;
            font-style: italic;
            font-size: 0.95rem;
        }

        .nav-hint {
            display: inline-block;
            margin-top: 30px;
            color: #aaddff;
            text-decoration: none;
            border: 1px solid #aaddff;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-hint:hover {
            background: #aaddff;
            color: #010105;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.8s ease-in; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>
    <div class="goddess-layer"></div>
    <div class="edge-softener"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="subtitle">A Rhetorical Constellation</div>

        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos', this)"><div class="star-dot"></div><span class="label">Constitutive Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos', this)"><div class="star-dot"></div><span class="label">Ethos as Dwelling</span></div>
            <div class="node" id="n3" onclick="openNode('invite', this)"><div class="star-dot"></div><span class="label">Invitational</span></div>
            <div class="node" id="n4" onclick="openNode('agency', this)"><div class="star-dot"></div><span class="label">Audience Agency</span></div>
        </div>

        <div id="panel" class="fade-in"></div>
    </div>

    <script>
const info = {
    logos: `<h3>Constitutive Logos: The Performative Force of the Demos</h3>
            <p>To understand Isocrates’ <em>logos</em>, we must first dismantle the Aristotelian definition that has dominated Western thought. As Haskins notes, Aristotle "neutralizes the oral performative dimensions of discursive practice by stressing the propositional content." For Aristotle, rhetoric is a secondary tool—a way to relay pre-existing truths. However, in the Isocratean tradition, <em>logos</em> is a performative force. It is the energy that <em>creates</em> reality. As Francis Kane argues in <em>Peitho and the Polis</em>, it is "by the power of persuading one another that we have raised ourselves above the level of beasts, founded cities, laid down laws and discovered arts."</p>
            
            <p>This creates a profound shift: the audience (the <em>demos</em>) does not exist as a political entity until the speech begins. Aristotle assumes a "natural priority" within the polis, where people are already categorized into pre-existing social roles by nature. In this "given grid," the rhetorician simply speaks to a group that is already there. Isocrates rejects this. He approaches his audience as a "community to be called into existence." The act of speaking—the performance of the <em>logos</em>—is what "goads" individuals into a cultural collectivity. Persuasion, then, is not the act of changing a person’s mind, but the performative act of inviting them into a new identity as a member of a community.</p>
            
            <p>If the audience doesn't exist until the speech begins, rhetoric becomes a <em>techne</em> of life itself, moving from the creation of a group to the space that group occupies. As Atwill argues for the resurgence of <em>techne</em>, we see that Isocrates’ pedagogy was not about deception, but about conditioning "students’ moral behavior so that they would think and speak noble, virtuous ideas." This is a "politically redemptive role" where persuasion replaces the domestic cycle of vengeance with the public light of the polis. By focusing on the performative rather than the propositional, we move rhetoric back into the realm of the mythopoetic—a space where language is magic, and that magic is what founds the city itself. Kane reminds us that the move from the <em>Eumenides</em> to the <em>polis</em> is a move from the "blood-guilt" of the home to the "honeyed persuasion" of the assembly, where the logos acts as the catalytic balm of civil life. This is the first step in recovering Peitho: recognizing that logos does not discipline a fixed audience but calls a world into being.</p>`,
            
    ethos: `<h3>Ethos as Dwelling: Character as a Site of Relation</h3>
            <p>Ethos is often reduced to "credibility" or "authority," but through an Isocratean lens, it is an open site of dwelling. Aristotle "disciplines" the rhetorical transaction by assigning specific ends and topics to specific pre-existing social roles. In contrast, Isocratean <em>ethos</em> is a way of being that you <em>perform</em>. As Kane notes, persuasion is an activity "the engagement in which constitutes us as human beings." Isocrates co-opts the "oral resources of the mythopoetic tradition" to construct an identity of the "citizen-rhetor" through textual performance. This isn't about proving you are right; it is about proving you belong to the community you are calling into being.</p>
            
            <p>This is where the connection to Feminist Invitational Rhetoric becomes explicit. If <em>ethos</em> is a "dwelling," it is a space of relation. While Aristotle’s model is one of "natural priority" (where some are born to lead and others to follow), the Isocratean model is one of relation-building. There is no <em>a priori</em> structure here; the social roles of both the speaker and the audience are "constituted and sustained through discourse." Kennerly and Woods describe this beautifully through the personification of <em>Rhetorica</em> as the "mistress of hearts, of minds the queen," a figure who moves through the world not by force, but by the seductive pull of shared space and common affection.</p>
            
            <p>By viewing <em>ethos</em> as a performative site, we reclaim the "Peitho" that Blake and the Sophists recognized: a force that is "unstable, gendered, and seductive." It is seductive because it invites the listener into a shared space; it is the "river of love" and the "light of politics" that illuminates the <em>polis</em>. This recovery allows us to view <em>ethos</em> as a "jealously guarded prerogative" of citizenship, prioritizing communal love over domestic vengeance. It is a rhetoric that asks: "How can we dwell together?" rather than "How can I master you?" In this dwelling, the "Platonic Paradox" of memory and delivery is resolved; the rhetor's character is the living memory of the community's highest virtues, delivered through a performance that welcomes the other into the hearth of the city. We are putting back the "feminine" dimension by making ethos about the vulnerability of dwelling rather than the armor of expertise.</p>`,
            
    invite: `<h3>Invitational Rhetoric: Peitho as the Catalytic Balm</h3>
             <p>The "Recovery of Peitho" requires a rejection of rhetoric as "deception and flattery." As Isocrates sought to show, rhetoric is a tool for the "implementation of civic policy through noble thought." This is the essence of Invitational Rhetoric: a term that Foss and Griffin describe as "a definition and explication of a rhetoric built on principles of equality, immanent value, and self-determination rather than on an attempt to control others" (4).  While Aristotle focuses on "logical argument" and "historical facts," Isocrates utilizes "amplification and smoothness of style." This "smoothness" is not mere decoration; it is the aesthetic force—the "catalytic balm"—that makes the "calling into being" of a community possible. It is the move from the <em>stasis</em> of civil war to the <em>peitho</em> of civil discourse.</p>
             
             <p>As Kennerly and Woods argue in "Moving Rhetorica, we must see rhetoric as a techne that navigates the "unstable" and the "gendered." Peitho, as the goddess of persuasion, was never about logical syllogisms; she was about the "seductive" pull of community. In Isocrates, this is manifest in his "far more expansive view of rhetoric." He doesn't just want to win a debate; he wants to respond to the "historically unique occasions" of his time by creating a site of welcome. This mirrors the transformation of the Furies into the Eumenides; the terrifying, private force of vengeance is invited to become a public, protective force through the power of "honeyed speech."</p>
             
             <p>This is a rhetoric of Welcome. If, as Kane argues, persuasion is the "fundamental logos" of human affairs, it is the only way we come to the "truth" of an action within a community. Ultimately, to recover Peitho is to recover the belief that we are not bound by "natural social roles." We are bound by the <em>logoi</em> we choose to perform, inviting the audience to join in the creation of a "cultural collectivity." This is the "good idea" Blake saw: a constellation where Aristotle's masculine mastery gives way to a feminist, Isocratean invitation. Here, persuasion is not a weapon, but a "river of love" that ensures "no house shall prosper" without the sacred majesty of mutual respect and shared perspective. Peitho is restored here as legitimate precisely because she is seductive—she creates the desire for community.</p>`,

    agency: `<h3>Audience Agency: The Freedom of the Persuaded</h3>
             <p>If logos is constitutive and ethos is a dwelling, then Audience Agency is redefined as the freedom found within persuasion. In the Aristotelian model, the audience is a target—an object to be moved. But in the Isocratean vision, the audience is an active participant in their own creation. Something Foss and Griffin describe as an offering involving "not probing or invading but giving... a presence, an offering, an opening" (7). As Kane notes, the <em>polis</em> is founded on the rejection of force (<em>bia</em>) in favor of persuasion (<em>peitho</em>). This means that to be persuaded is to exercise a unique form of agency: the agency to join a community of one's own free will. Persuasion can be seen as the "antidote" to civil strife because it requires the consent of the governed to exist at all. However, providing the audience agency also requires giving them the ability to reject that offering--something Aristotle's concept doesn't provide.</p>
             
             <p>Kairos is the "right time" for this agency to be exercised. It is the moment when the performative force of logos meets the audience's willingness to be goaded into collectivity. Unlike Aristotle, who disciplines rhetoric, Isocrates sees <em>kairos</em> as a "historically unique occasion" for agency. Kennerly and Woods remind us that <em>Rhetorica</em> is a "mistress of hearts," implying that her power is not coercive but attractive. The audience exercises agency by choosing to be moved by the rhetor's performance. This movement is the energy Kennedy describes—-not just affecting a situation, but <em>choosing</em> to enter a new one.</p>
             
             <p>By focusing on Audience Agency, persuasion is not a static act of logic, but a dynamic act of participation. Each node in this digital constellation is a Kairotic moment—an opportunity for the viewer to exercise agency by engaging with the "Recovering Peitho" project. This is the Isocratean vision adapted for today’s discursive education: a way to create a community of cultural critique where agency is found in the shared word. Persuasion is the "light of politics" because it requires a witness who is free to look away, but chooses instead to dwell within the logos. So who then gets to participate? In this model, everyone participating in the logos is granted the agency of the called, a community-constituting power that Aristotle's neutered <em>to pithanon</em> could never offer.</p>`
};
        function openNode(key, element) {
            // UI Updates
            const panel = document.getElementById('panel');
            const nodes = document.querySelectorAll('.node');
            
            nodes.forEach(n => n.classList.remove('active'));
            element.classList.add('active');

            // Content Update
            panel.innerHTML = info[key];
            panel.style.display = 'block';
            
            // Smooth scroll to panel
            setTimeout(() => {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>
</html>
