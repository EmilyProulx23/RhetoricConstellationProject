<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovering Peitho</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #0000000;
            font-family: 'Georgia', serif;
            color: white;
            overflow-x: hidden;
        }

        .stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #010105 100%);
            z-index: -20;
        }

        .goddess-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('peitho-constellation.jpg') no-repeat center center;
            background-size: contain;
            z-index: -10;
        }

        .edge-softener {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                transparent 40%, 
                rgba(1, 1, 5, 0.4) 60%, 
                rgba(1, 1, 5, 1) 95%);
            z-index: -5;
        }

        .scroll-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            font-style: italic; font-weight: normal;
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
            margin-bottom: 20px;
        }

        .map {
            position: relative;
            width: 100%;
            max-width: 540px; 
            height: 600px;
        }

        .node {
            position: absolute;
            cursor: pointer;
            text-align: center;
            transform: translate(-50%, -50%);
        }

        /* TWINKLE ANIMATION */
        @keyframes twinkle {
            0% { transform: scale(1); box-shadow: 0 0 10px white; }
            50% { transform: scale(1.2); box-shadow: 0 0 25px #aaddff, 0 0 40px #aaddff; }
            100% { transform: scale(1); box-shadow: 0 0 10px white; }
        }

        .star-dot {
            width: 10px; height: 10px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 15px white;
            animation: twinkle 3s infinite ease-in-out;
        }

        /* Stagger the twinkles so they don't pulse at the same time */
        #n1 .star-dot { animation-delay: 0s; }
        #n2 .star-dot { animation-delay: 0.5s; }
        #n3 .star-dot { animation-delay: 1.2s; }
        #n4 .star-dot { animation-delay: 2s; }

        .label {
            display: block; margin-top: 10px;
            font-size: 0.6rem; letter-spacing: 2.5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px black;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .node:hover .label { opacity: 1; text-shadow: 0 0 10px white; }

        /* PRECISION ALIGNMENT */
        #n1 { top: 18.5%; left: 34%; }   /* Logos (Head) */
        #n2 { top: 29.5%; left: 41%; }   /* Ethos (Heart) */
        #n3 { top: 18%; left: 59%; }     /* Invitation (Right Hand) */
        #n4 { top: 87.5%; left: 45%; }   /* Kairos (Right Ankle) */

        /* TRANSPARENT INFO BOX */
        #panel {
            max-width: 500px;
            margin: 40px 0 100px 0;
            padding: 25px;
            /* Lowering the 0.85 to 0.4 for high transparency */
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(12px); /* Keeps text readable over stars */
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            display: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin-top: 0; font-weight: normal; letter-spacing: 1px; }
        p { line-height: 1.6; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="stars-bg"></div>
    <div class="goddess-layer"></div>
    <div class="edge-softener"></div>

    <div class="scroll-container">
        <h1>Recovering Peitho</h1>
        <div class="map">
            <div class="node" id="n1" onclick="openNode('logos')"><div class="star-dot"></div><span class="label">Logos</span></div>
            <div class="node" id="n2" onclick="openNode('ethos')"><div class="star-dot"></div><span class="label">Ethos</span></div>
            <div class="node" id="n3" onclick="openNode('invite')"><div class="star-dot"></div><span class="label">Invitation</span></div>
            <div class="node" id="n4" onclick="openNode('kairos')"><div class="star-dot"></div><span class="label">Kairos</span></div>
        </div>
        <div id="panel"></div>
    </div>

    <script>
        const info = {
            logos: "<h3>Logos</h3><p>The energy of assembly that calls community into being. Peitho as a force of association rather than a tool of manipulation.</p>",
            ethos: "<h3>Ethos</h3><p>Shifting from 'credibility' to an open site where relation is the priority. Ethos is where we dwell together.</p>",
            invite: "<h3>Invitation</h3><p>Offering perspective rather than demanding compliance. A recovery of the feminine instability of Peitho.</p>",
            kairos: "<h3>Kairos</h3><p>The 'right time' shifting from persuasion to a moment of welcome. This node marks rhetoric in motion.</p>"
        };

        function openNode(k) {
            const p = document.getElementById('panel');
            p.style.display = 'block';
            p.innerHTML = info[k];
            p.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
